name: Deploy Secretary Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall .

      - name: Help
        run: python main.py --help

      - name: Import core modules
        run: |
          python - <<'PY'
          import secretary.app
          import secretary.archive
          import secretary.batching
          import secretary.chat_history
          import secretary.codex_client
          import secretary.config
          import secretary.context_manager
          import secretary.decision_engine
          import secretary.events
          import secretary.logging_setup
          import secretary.models
          import secretary.notifier
          import secretary.polling
          import secretary.secretary_assistant
          import secretary.state
          import secretary.summary
          import secretary.telegram_client
          print("core imports ok")
          PY

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/secretary_deploy_key
          chmod 600 ~/.ssh/secretary_deploy_key
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Create release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='config.yaml' \
            --exclude='context.md' \
            --exclude='context.backups' \
            --exclude='state.json' \
            --exclude='logs' \
            --exclude='chat_archive' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            -czf /tmp/secretary-bot-release.tar.gz .

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          scp -i ~/.ssh/secretary_deploy_key -P "${SERVER_PORT:-22}" /tmp/secretary-bot-release.tar.gz "$SERVER_USER@$SERVER_HOST:/tmp/secretary-bot-release.tar.gz"

      - name: Deploy and restart service
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -i ~/.ssh/secretary_deploy_key -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" <<'SH'
          set -euo pipefail
          rm -rf /tmp/secretary-bot-release
          mkdir -p /tmp/secretary-bot-release
          tar -xzf /tmp/secretary-bot-release.tar.gz -C /tmp/secretary-bot-release
          bash /tmp/secretary-bot-release/deploy/server/bootstrap.sh /tmp/secretary-bot-release
          bash /tmp/secretary-bot-release/deploy/server/deploy.sh /tmp/secretary-bot-release
          SH
